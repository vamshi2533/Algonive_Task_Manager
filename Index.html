<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════ HEADER ═══════════════════════════ -->
  <header>
    <div class="logo">
      <div class="logo-dot">✦</div>
      TaskFlow
    </div>
    <div class="header-stats">
      <div class="stat-pill">
        <span class="count" id="stat-total">0</span> Total
      </div>
      <div class="stat-pill">
        <span class="count" id="stat-done">0</span> Done
      </div>
      <div class="stat-pill">
        <span class="count" id="stat-due">0</span> Due Soon
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════ REMINDER BANNER ═════════════════ -->
  <div id="reminder-banner"></div>

  <!-- ═══════════════════════════ MAIN CONTAINER ══════════════════ -->
  <div class="container">

    <!-- Add Task Panel -->
    <div class="add-panel">
      <div class="panel-title">+ New Task</div>

      <div class="form-row">
        <input type="text" id="task-title" placeholder="Task title…" maxlength="120" />
      </div>

      <div class="form-row mt-12">
        <textarea id="task-desc" placeholder="Description (optional)…"></textarea>
      </div>

      <div class="form-row two mt-12">
        <input type="date" id="task-due" />
        <select id="task-priority">
          <option value="normal">Normal Priority</option>
          <option value="high">High Priority</option>
          <option value="low">Low Priority</option>
        </select>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="add-btn">Add Task</button>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="done">Completed</button>
      <button class="filter-btn" data-filter="overdue">Overdue</button>
      <button class="filter-btn" data-filter="due-soon">Due Soon</button>
    </div>

    <!-- Section Header -->
    <div class="section-header">
      <span class="section-label" id="filter-label">All Tasks</span>
      <span class="section-label" id="task-count-label"></span>
    </div>

    <!-- Task List -->
    <div id="task-list"></div>

  </div>

  <!-- ═══════════════════════════ EDIT MODAL ═══════════════════════ -->
  <div class="modal-backdrop" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Edit Task</div>
        <button class="icon-btn" id="modal-close-btn">✕</button>
      </div>

      <div class="form-row">
        <input type="text" id="edit-title" placeholder="Task title…" maxlength="120" />
      </div>

      <div class="form-row mt-12">
        <textarea id="edit-desc" placeholder="Description…"></textarea>
      </div>

      <div class="form-row two mt-12">
        <input type="date" id="edit-due" />
        <select id="edit-priority">
          <option value="normal">Normal Priority</option>
          <option value="high">High Priority</option>
          <option value="low">Low Priority</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="modal-save-btn">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
